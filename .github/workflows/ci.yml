name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt pytest
      - run: pytest -q
      - name: Verify hidden scenarios are absent
        run: |
          ! rg -n 'HIDDEN_SCENARIOS|hidden-0[1-5]|6637|12377|44729|99173|104729' . \
            --glob '!README.md' --glob '!.git/**' --glob '!.arena/**'
